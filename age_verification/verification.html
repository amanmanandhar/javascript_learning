<!DOCTYPE html>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    </head>
    <body>
        <div class="container d-flex justify-content-center align-items-center vh-100">
            <div class="bg-white rounded shadow d-flex justify-content-center align-items-center" style='width:400px; height: 400px;'>
                <form id="loginForm">
                    <input type="text" id="username" class="form-control mb-3 w-100" placeholder="Enter your name">
                    <input type="password" id="password" class="form-control mb-3 w-100" placeholder="Enter your password">
                    <p id="error" class="text-danger"></p>
                    <button class="btn btn-primary">
                        Log In
                    </button>
                </form>
            </div>
        </div>
        <script src="verification.js"></script>
    </body>
</html>
